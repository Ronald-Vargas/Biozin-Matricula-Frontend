<div class="app-container" [class.sidebar-collapsed]="sidebarCollapsed">

  <!-- ══════ SIDEBAR ══════ -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">


    <!-- Header -->
    <div class="sidebar-header">
        <img 
          src="./Biozin_logo.png" 
          alt="Biozin Matrícula"
          class="sidebar-logo"
        />
      <button class="toggle-btn" (click)="toggleSidebar()">
        {{ sidebarCollapsed ? '▶' : '◀' }}
      </button>
    </div>





    <!-- Navigation con secciones -->
    <nav class="sidebar-nav">
      <div class="nav-section" *ngFor="let section of menuSections">
        <span class="nav-section-title">{{ section.title }}</span>
        <a
          *ngFor="let item of section.items"
          class="nav-item"
          [routerLink]="item.path"
          routerLinkActive="active"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </div>
    </nav>





    
    <!-- Footer / User -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">👤</div>
        <div class="user-info">
          <div class="user-name">{{ userName }}</div>
          <div class="user-role">{{ userRole }}</div>
        </div>
      </div>
    </div>

  </aside>







  
  <!-- ══════ MAIN CONTENT ══════ -->
  <div class="main-content">

    <!-- Top Header -->
    <header class="top-header">
      <div class="breadcrumb">
        <span>🏠</span>
        <span>/ {{ currentPageTitle }}</span>
      </div>
      <div class="header-right">
        <span class="header-date">{{ today | date:'d \'de\' MMMM, yyyy' }}</span>
        <a routerLink="/ajustes" class="settings-btn" title="Ajustes">⚙️</a>
      </div>
    </header>

    <!-- Content Area -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
