<app-toast></app-toast>

<div class="app-container" [class.sidebar-collapsed]="sidebarCollapsed">

  <!-- Overlay mobile -->
  <div class="sidebar-overlay" *ngIf="mobileOpen" (click)="closeMobileMenu()"></div>

  <!-- ══════ SIDEBAR ══════ -->
  <aside #sidebarScroller class="sidebar" [class.collapsed]="sidebarCollapsed" [class.mobile-open]="mobileOpen">


    <!-- Header -->
    <div class="sidebar-header">
        <img 
          src="./Biozin_logo.png" 
          alt="Biozin Matrícula"
          class="sidebar-logo"
        />
      <button class="toggle-btn" (click)="toggleSidebar()">
        {{ sidebarCollapsed ? '▶' : '◀' }}
      </button>
    </div>





    <div class="sidebar-body">
    <!-- Navigation con secciones -->
    <nav class="sidebar-nav">
      <div class="nav-section" *ngFor="let section of menuSections">
        <span class="nav-section-title">{{ section.title }}</span>
        <a
          *ngFor="let item of section.items"
          class="nav-item"
          [routerLink]="item.path"
          routerLinkActive="active"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </div>
    </nav>





    
    <!-- Footer / User -->
    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">👤</div>
        <div class="user-info">
          <div class="user-name">{{ userName }}</div>
          <div class="user-role">{{ userRole }}</div>
        </div>
      </div>
    </div>
    </div>

  </aside>







  
  <!-- ══════ MAIN CONTENT ══════ -->
  <div class="main-content">

    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="hamburger-btn" (click)="toggleMobileSidebar()" title="Menú">☰</button>
        <div class="breadcrumb">
          <span>🏠</span>
          <span>/ {{ currentPageTitle }}</span>
        </div>
      </div>
      <div class="header-right">
        <span class="header-date">{{ today | date:'d \'de\' MMMM, yyyy' }}</span>
        <div class="settings-wrapper">
          <button class="settings-btn" (click)="toggleSettingsMenu()" title="Opciones">⚙️</button>
          <div class="settings-dropdown" *ngIf="showSettingsMenu">
            <a *ngIf="isAdmin" routerLink="/ajustes" class="dropdown-item">⚙️ Ajustes</a>
            <button class="dropdown-item dropdown-item--danger" (click)="logout()">🚪 Cerrar sesión</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
