<div class="page-container">

  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrapper">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          <path d="M18 8h4M20 6v4"/>
        </svg>
      </div>
    </div>

    <!-- Títulos -->
    <h1 class="title">BIOZIN MATRÍCULAS</h1>
    <p class="subtitle">{{ modoRecuperacion ? 'RECUPERAR CONTRASEÑA' : 'CAMBIAR CONTRASEÑA' }}</p>

    <!-- Email (solo lectura) -->
    <div class="email-display" *ngIf="email">{{ email }}</div>

    <!-- Formulario -->
    <div class="form-body">

      <!-- Botón enviar código (solo modo recuperación, antes de enviar) -->
      <div *ngIf="modoRecuperacion && !codigoEnviado" class="send-code-section">
        <p class="send-code-info">Se enviará un código de 6 dígitos a tu correo registrado.</p>
        <button class="send-code-btn" (click)="onEnviarCodigo()" [disabled]="enviandoCodigo || !email">
          <span *ngIf="!enviandoCodigo">Enviar código al correo</span>
          <span *ngIf="enviandoCodigo" class="spinner"></span>
        </button>
      </div>

      <!-- Reenviar código -->
      <div *ngIf="modoRecuperacion && codigoEnviado" class="resend-code">
        <span>¿No recibiste el código?</span>
        <button class="resend-btn" (click)="onEnviarCodigo()" [disabled]="enviandoCodigo">
          {{ enviandoCodigo ? 'Enviando...' : 'Reenviar' }}
        </button>
      </div>

      <!-- Campo: contraseña temporal o código de recuperación -->
      <div class="field" *ngIf="!modoRecuperacion || codigoEnviado">
        <label>{{ modoRecuperacion ? 'CÓDIGO DE RECUPERACIÓN' : 'CONTRASEÑA ACTUAL' }}</label>
        <span class="input-wrapper">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <input
            [type]="modoRecuperacion ? 'text' : (showTempPassword ? 'text' : 'password')"
            [placeholder]="modoRecuperacion ? 'Ingrese el código de 6 dígitos' : 'Ingrese su contraseña actual'"
            [(ngModel)]="contrasenaTemporal"
            [class]="modoRecuperacion ? '' : 'has-right-icon'"
            maxlength="{{ modoRecuperacion ? 6 : 100 }}"
          />
          <svg *ngIf="!modoRecuperacion" class="icon-right" (click)="toggleTempPassword()"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <ng-container *ngIf="!showTempPassword">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </ng-container>
            <ng-container *ngIf="showTempPassword">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </ng-container>
          </svg>
        </span>
      </div>

      <!-- Nueva contraseña -->
      <div class="field" *ngIf="!modoRecuperacion || codigoEnviado">
        <label>NUEVA CONTRASEÑA</label>
        <span class="input-wrapper">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            placeholder="Crea una clave segura"
            [(ngModel)]="nuevaContrasena"
            class="has-right-icon"
          />
          <svg class="icon-right" (click)="toggleNewPassword()"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <ng-container *ngIf="!showNewPassword">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </ng-container>
            <ng-container *ngIf="showNewPassword">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </ng-container>
          </svg>
        </span>
      </div>

      <!-- Confirmar contraseña -->
      <div class="field" *ngIf="!modoRecuperacion || codigoEnviado">
        <label>CONFIRMAR CONTRASEÑA</label>
        <span class="input-wrapper">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="Repite la clave nueva"
            [(ngModel)]="confirmarContrasena"
            class="has-right-icon"
          />
          <svg class="icon-right" (click)="toggleConfirmPassword()"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <ng-container *ngIf="!showConfirmPassword">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </ng-container>
            <ng-container *ngIf="showConfirmPassword">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </ng-container>
          </svg>
        </span>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

      <!-- Éxito -->
      <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

      <!-- Botón cambiar -->
      <button *ngIf="!modoRecuperacion || codigoEnviado"
        class="submit-btn" (click)="onCambiarContrasena()" [disabled]="isLoading">
        <span *ngIf="!isLoading">CAMBIAR CONTRASEÑA</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <!-- Cancelar -->
      <button class="cancel-link" (click)="volverAlInicio()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        CANCELAR Y VOLVER AL INICIO
      </button>

    </div>

  </div>

</div>
