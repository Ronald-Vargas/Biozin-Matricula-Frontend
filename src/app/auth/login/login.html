
<div class="login-container">

  <div class="login-card">

    <!-- Header -->
    <div class="card-header">
      <p class="welcome">Bienvenido(a) al sistema</p>
      <div class="header-accent"></div>
    </div>

    <!-- Formulario -->
    <div class="card-body">

      <!-- Email -->
      <div class="field">
        <label for="email">Correo electrónico</label>
        <span class="input-wrapper">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            id="email"
            type="email"
            placeholder="Ingrese su correo institucional"
            [(ngModel)]="email"
            autocomplete="email"
          />
        </span>
      </div>

      <!-- Contraseña -->
      <div class="field">
        <label for="password">Contraseña</label>
        <span class="input-wrapper">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Ingrese su contraseña"
            [(ngModel)]="password"
            autocomplete="current-password"
            class="has-right-icon"
          />
          <svg
            *ngIf="!showPassword"
            class="icon-right"
            (click)="togglePassword()"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>

          <svg
            *ngIf="showPassword"
            class="icon-right"
            (click)="togglePassword()"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>

      <!-- Links inferiores -->
      <div class="forgot-password">
        <a routerLink="/auth/recover-password">¿Olvidaste tu contraseña?</a>
        <span class="separator">·</span>
        <a (click)="onCambiarContrasenaTemporaria()" class="temp-password-link">Cambiar contraseña temporal</a>
      </div>

      <!-- Error email para contraseña temporal -->
      <div *ngIf="emailErrorForTempPassword" class="error-message">{{ emailErrorForTempPassword }}</div>

      <!-- Error login -->
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

      <!-- Botón -->
      <button class="login-btn" (click)="onLogin()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar sesión</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

    </div>

    <!-- Footer -->
    <div class="card-footer">© 2026 Biozin Software</div>

  </div>

</div>s
