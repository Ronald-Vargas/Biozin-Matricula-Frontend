
<div class="modal-overlay" *ngIf="visible" (click)="cerrar()">
  <div class="modal" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">📋 Habilitar Curso para Matrícula</h2>
      <button class="modal-close" (click)="cerrar()">✕</button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <div class="form-grid">

        <!-- Período -->
        <div class="form-group full">
          <label class="form-label">Período Académico</label>
          <select
            class="form-select"
            [(ngModel)]="oferta.periodoId"
            (ngModelChange)="onPeriodoChange()"
          >
            <option value="">Seleccionar período...</option>
            <option *ngFor="let p of periodos" [value]="p.idPeriodo">{{ p.nombre }}</option>
          </select>
        </div>

        <!-- Curso -->
        <div class="form-group full">
          <label class="form-label">Curso</label>
          <select
            class="form-select"
            [(ngModel)]="oferta.cursoId"
            (ngModelChange)="onCursoChange()"
          >
            <option value="">Seleccionar curso...</option>
            <option *ngFor="let c of cursos" [value]="c.idCurso">
              {{ c.codigo }} — {{ c.nombre }}
            </option>
          </select>
        </div>

        <!-- Profesor -->
        <div class="form-group full">
          <label class="form-label">Profesor</label>
          <select
            class="form-select"
            [(ngModel)]="oferta.profesorId"
            (ngModelChange)="onProfesorChange()"
          >
            <option value="">Seleccionar profesor...</option>
            <option *ngFor="let pr of profesores" [value]="pr.idProfesor">
              {{ pr.nombre }} {{ pr.apellidoPaterno }} {{ pr.apellidoMaterno }}
            </option>
          </select>
        </div>

        <!-- Días y Horarios -->
        <div class="form-group full">
          <label class="form-label">Días y Horarios</label>
          <div class="dias-container">
            <div *ngFor="let d of diasOptions" class="dia-row">
              <label class="dia-check-label">
                <input
                  type="checkbox"
                  [(ngModel)]="d.seleccionado"
                  [name]="'dia-' + d.abrev"
                  class="dia-checkbox"
                />
                <span class="dia-nombre">{{ d.nombre }}</span>
              </label>
              <div *ngIf="d.seleccionado" class="dia-times">
                <input
                  type="time"
                  class="form-input time-input"
                  [(ngModel)]="d.horaInicio"
                  [name]="'inicio-' + d.abrev"
                />
                <span class="time-sep">a</span>
                <input
                  type="time"
                  class="form-input time-input"
                  [(ngModel)]="d.horaFin"
                  [name]="'fin-' + d.abrev"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- Aula -->
        <div class="form-group">
          <label class="form-label">Aula</label>
          <input
            class="form-input"
            type="text"
            placeholder="Ej: A-201"
            [(ngModel)]="oferta.aula"
          />
        </div>

        <!-- Cupo -->
        <div class="form-group">
          <label class="form-label">Cupo Máximo</label>
          <input
            class="form-input"
            type="number"
            [(ngModel)]="oferta.cupoMaximo"
            min="1"
            max="100"
          />
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" (click)="cerrar()">Cancelar</button>
      <button class="btn-save" (click)="guardar()">Habilitar Curso</button>
    </div>

  </div>
</div>
