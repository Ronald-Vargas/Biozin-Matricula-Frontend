<div class="panel-header">
  <div>
    <h2 class="panel-title">{{ esEdicion ? 'Editar Administrador' : 'Nuevo Administrador' }}</h2>
    <p class="panel-subtitle">{{ esEdicion ? 'Modifica los datos del administrador.' : 'Completa los datos para crear un nuevo administrador.' }}</p>
  </div>
  <button class="btn-close" (click)="cancelar.emit()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<div class="form-body">

  <!-- Información base -->
  <h3 class="section-title">👤 Información del administrador</h3>
  <form [formGroup]="adminForm">
    <div class="form-grid">

      <div class="form-group">
        <label class="form-label">IDENTIFICACIÓN *</label>
        <input class="form-input" type="text" placeholder="Ej: 10928374" formControlName="identificacion"
          [class.input-error]="identificacion?.invalid && identificacion?.touched" />
        <span class="error-text" *ngIf="identificacion?.errors?.['required'] && identificacion?.touched">Requerido.</span>
      </div>

      <div class="form-group">
        <label class="form-label">NOMBRE COMPLETO *</label>
        <input class="form-input" type="text" placeholder="Ej: Ana García" formControlName="nombre"
          [class.input-error]="nombre?.invalid && nombre?.touched" />
        <span class="error-text" *ngIf="nombre?.errors?.['required'] && nombre?.touched">Requerido.</span>
      </div>

      <div class="form-group">
        <label class="form-label">CORREO *</label>
        <input class="form-input" type="email" placeholder="ana@empresa.com" formControlName="correo"
          [class.input-error]="correo?.invalid && correo?.touched" />
        <span class="error-text" *ngIf="correo?.errors?.['required'] && correo?.touched">Requerido.</span>
        <span class="error-text" *ngIf="correo?.errors?.['email'] && correo?.touched">Correo inválido.</span>
      </div>

      <div class="form-group full">
        <label class="form-label">TELÉFONO</label>
        <input class="form-input" type="tel" placeholder="+506 0000-0000" formControlName="telefono" />
      </div>

    </div>
  </form>

</div>

<div class="panel-footer">
  <span class="error-text" *ngIf="mensajeError" style="margin-right: auto; color: var(--color-danger, #e53e3e);">
    ❌ {{ mensajeError }}
  </span>
  <button type="button" class="btn-cancel" (click)="cancelar.emit()">Cancelar</button>
  <button type="button" class="btn-submit" [disabled]="formInvalido || guardando" (click)="guardar()">
    {{ guardando ? 'Guardando...' : (esEdicion ? 'Guardar cambios' : 'Crear administrador') }}
  </button>
</div>
