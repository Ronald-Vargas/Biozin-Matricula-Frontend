<div class="overlay" *ngIf="visible" (click)="onCerrar()"></div>

<div class="modal" *ngIf="visible"
     [class.modal-wide]="vista === 'detail'"
     (click)="$event.stopPropagation()">

  <app-administrador-list
    *ngIf="vista === 'list'"
    (cerrar)="onCerrar()"
    (nuevo)="abrirNuevo()"
    (editar)="abrirEditar($event)"
    (verDetalle)="abrirDetalle($event)">
  </app-administrador-list>

  <app-administrador-form
    *ngIf="vista === 'form'"
    [admin]="adminSeleccionado"
    (cancelar)="volverALista()"
    (guardado)="volverALista()">
  </app-administrador-form>

  <app-administrador-detail
    *ngIf="vista === 'detail'"
    [admin]="adminSeleccionado!"
    (cerrar)="volverALista()"
    (editar)="abrirEditar($event)">
  </app-administrador-detail>

</div>
