
<div class="modal-overlay" *ngIf="visible" (click)="cerrar()">
  <div class="modal" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">{{ modoEdicion ? '✏️ Editar Oferta Académica' : '📋 Habilitar Curso para Matrícula' }}</h2>
      <button class="modal-close" (click)="cerrar()">✕</button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <div class="form-grid">

        <!-- Período -->
        <div class="form-group full">
          <label class="form-label">Período Académico</label>
          <select
            class="form-select"
            [(ngModel)]="oferta.idPeriodo"
          >
            <option [value]="0">Seleccionar período...</option>
            <option *ngFor="let p of periodos" [value]="p.idPeriodo">{{ p.nombre }}</option>
          </select>
        </div>

        <!-- Curso -->
        <div class="form-group full">
          <label class="form-label">Curso</label>
          <select
            class="form-select"
            [(ngModel)]="oferta.idCurso"
            (ngModelChange)="onCursoChange()"
          >
            <option [value]="0">Seleccionar curso...</option>
            <option *ngFor="let c of cursos" [value]="c.idCurso">
              {{ c.codigo }} — {{ c.nombre }}
            </option>
          </select>
        </div>

        <!-- Profesor -->
        <div class="form-group full">
          <label class="form-label">Profesor</label>
          <select
            class="form-select"
            [(ngModel)]="oferta.idProfesor"
          >
            <option [value]="0">Seleccionar profesor...</option>
            <option *ngFor="let pr of profesores" [value]="pr.idProfesor">
              {{ pr.nombre }} {{ pr.apellidoPaterno }} {{ pr.apellidoMaterno }}
            </option>
          </select>
        </div>

        <!-- Días y Horarios -->
        <div class="form-group full">
          <label class="form-label">
            Días y Horarios
            <span *ngIf="horasCurso > 0" class="horas-contador" [class.horas-excedidas]="horasAsignadas > horasCurso">
              {{ horasAsignadas }} / {{ horasCurso }} h
            </span>
          </label>
          <div class="dias-container">
            <div *ngFor="let d of diasOptions" class="dia-row">
              <label class="dia-check-label">
                <input
                  type="checkbox"
                  [(ngModel)]="d.seleccionado"
                  [name]="'dia-' + d.abrev"
                  class="dia-checkbox"
                />
                <span class="dia-nombre">{{ d.nombre }}</span>
              </label>
              <div *ngIf="d.seleccionado" class="dia-times">
                <input
                  type="time"
                  class="form-input time-input"
                  [(ngModel)]="d.horaInicio"
                  [name]="'inicio-' + d.abrev"
                  (ngModelChange)="onHoraInicioChange(d)"
                />
                <span class="time-sep">a</span>
                <input
                  type="time"
                  class="form-input time-input"
                  [(ngModel)]="d.horaFin"
                  [name]="'fin-' + d.abrev"
                  [min]="d.horaInicio"
                  (ngModelChange)="errorHoras = ''"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- Aula -->
        <div class="form-group">
          <label class="form-label">Aula</label>
          <select
            class="form-select"
            [(ngModel)]="oferta.idAula"
            (ngModelChange)="onAulaChange()"
            [disabled]="!oferta.idCurso"
          >
            <option [value]="0">
              {{ oferta.idCurso ? 'Seleccionar aula...' : 'Seleccione un curso primero' }}
            </option>
            <option *ngFor="let a of aulasFiltradas" [value]="a.idAula">
              {{ a.numeroAula }} — Cap. {{ a.capacidad }}{{ a.esLaboratorio ? ' (Laboratorio)' : '' }}
            </option>
          </select>
          <small *ngIf="oferta.idCurso && aulasFiltradas.length === 0" class="form-hint">
            No hay aulas disponibles para este tipo de curso.
          </small>
        </div>

        <!-- Cupo -->
        <div class="form-group">
          <label class="form-label">Cupo Máximo</label>
          <input
            class="form-input"
            type="number"
            [(ngModel)]="oferta.cupoMaximo"
            [readonly]="!!oferta.idAula"
            [placeholder]="oferta.idAula ? '' : 'Seleccione un aula'"
            min="1"
            max="100"
          />
        </div>

      </div>
    </div>

    <!-- Error horas excedidas -->
    <div class="error-horario" *ngIf="errorHoras">{{ errorHoras }}</div>

    <!-- Error hora salida -->
    <div class="error-horario" *ngIf="errorHorario">{{ errorHorario }}</div>

    <!-- Conflictos de disponibilidad -->
    <div class="error-horario" *ngIf="conflictos.length > 0">
      <strong>Conflictos de horario:</strong>
      <ul style="margin: 0.4rem 0 0 1.2rem; padding: 0;">
        <li *ngFor="let c of conflictos">{{ c }}</li>
      </ul>
    </div>

    <!-- Error campos requeridos -->
    <div class="error-horario" *ngIf="errorFormulario">{{ errorFormulario }}</div>

    <!-- Error del servidor -->
    <div class="error-horario" *ngIf="errorServidor">{{ errorServidor }}</div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" (click)="cerrar()">Cancelar</button>
      <button class="btn-save" (click)="guardar()">{{ modoEdicion ? 'Guardar Cambios' : 'Habilitar Curso' }}</button>
    </div>

  </div>
</div>
