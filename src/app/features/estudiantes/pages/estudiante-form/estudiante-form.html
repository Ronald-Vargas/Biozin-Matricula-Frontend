<div class="form-container">

  <!-- Header -->
  <div class="form-page-header">
    <button class="btn-back" (click)="cancelar()">← Volver a la lista</button>
    <h1 class="page-title">{{ titulo }}</h1>
  </div>

  <div class="form-panel">
    <form (ngSubmit)="guardar()" #estudianteForm="ngForm">

      <!-- ═══ Información Personal ═══ -->
      <h3 class="form-section-title">👤 Información Personal</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Cédula *</label>
          <input type="text" [(ngModel)]="form.cedula" name="cedula" required placeholder="1-1234-5678" />
        </div>
        <div class="form-group">
          <label>Nombres *</label>
          <input type="text" [(ngModel)]="form.nombres" name="nombres" required placeholder="Juan Carlos" />
        </div>
        <div class="form-group">
          <label>Primer Apellido *</label>
          <input type="text" [(ngModel)]="form.apellidoPaterno" name="apellidoPaterno" required placeholder="Pérez" />
        </div>
        <div class="form-group">
          <label>Segundo Apellido</label>
          <input type="text" [(ngModel)]="form.apellidoMaterno" name="apellidoMaterno" placeholder="Rodríguez" />
        </div>
        <div class="form-group">
          <label>Fecha de Nacimiento *</label>
          <input type="date" [(ngModel)]="form.fechaNacimiento" name="fechaNacimiento" required />
        </div>
        <div class="form-group">
          <label>Género *</label>
          <select [(ngModel)]="form.genero" name="genero" required>
            <option value="">Seleccionar...</option>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
      </div>

      <!-- ═══ Información de Contacto ═══ -->
      <h3 class="form-section-title">📱 Información de Contacto</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Email Personal *</label>
          <input type="email" [(ngModel)]="form.emailPersonal" name="emailPersonal" required placeholder="juan&#64;gmail.com" />
        </div>
        <div class="form-group">
          <label>Teléfono Móvil *</label>
          <input type="tel" [(ngModel)]="form.telefono" name="telefono" required placeholder="8888-8888" />
        </div>
        <div class="form-group">
          <label>Teléfono Emergencia</label>
          <input type="tel" [(ngModel)]="form.telefonoEmergencia" name="telefonoEmergencia" placeholder="7777-7777" />
        </div>
        <div class="form-group">
          <label>Contacto de Emergencia</label>
          <input type="text" [(ngModel)]="form.nombreEmergencia" name="nombreEmergencia" placeholder="María Pérez (Madre)" />
        </div>
      </div>

      <!-- ═══ Información Académica ═══ -->
      <h3 class="form-section-title">🎓 Información Académica</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Carrera *</label>
          <select [(ngModel)]="form.carreraId" name="carreraId" required>
            <option value="">Seleccionar carrera...</option>
            <option *ngFor="let c of carreras" [value]="c.id">
              {{ c.codigo }} - {{ c.nombre }}
            </option>
          </select>
        </div>
        <div class="form-group">
          <label>Modalidad *</label>
          <select [(ngModel)]="form.modalidad" name="modalidad">
            <option value="Presencial">Presencial</option>
            <option value="Virtual">Virtual</option>
            <option value="Hibrido">Híbrido</option>
          </select>
        </div>
        <div class="form-group">
          <label>Jornada *</label>
          <select [(ngModel)]="form.jornada" name="jornada">
            <option value="Diurna">Diurna</option>
            <option value="Nocturna">Nocturna</option>
            <option value="Sabatina">Sabatina</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tipo de Beca</label>
          <select [(ngModel)]="form.tipoBeca" name="tipoBeca">
            <option value="Ninguna">Ninguna</option>
            <option value="25%">25%</option>
            <option value="50%">50%</option>
            <option value="75%">75%</option>
            <option value="100%">100%</option>
          </select>
        </div>
      </div>

      <!-- ═══ Dirección ═══ -->
      <h3 class="form-section-title">🏠 Dirección</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Provincia</label>
          <input type="text" [(ngModel)]="form.provincia" name="provincia" placeholder="San José" />
        </div>
        <div class="form-group">
          <label>Cantón</label>
          <input type="text" [(ngModel)]="form.canton" name="canton" placeholder="Central" />
        </div>
        <div class="form-group form-group-full">
          <label>Dirección Exacta</label>
          <textarea [(ngModel)]="form.direccion" name="direccion" rows="2" placeholder="Del parque central 200m norte..."></textarea>
        </div>
      </div>

      <!-- ═══ Acciones ═══ -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          💾 {{ esEdicion ? 'Actualizar' : 'Guardar' }} Estudiante
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
